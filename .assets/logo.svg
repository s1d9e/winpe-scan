<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00A4EF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0078D4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="100" fill="#0a0a0a"/>
  
  <!-- Windows Icon -->
  <rect x="20" y="25" width="50" height="50" rx="5" fill="#0078D4"/>
  <rect x="25" y="30" width="18" height="18" fill="#00A4EF"/>
  <rect x="47" y="30" width="18" height="18" fill="#00A4EF"/>
  <rect x="25" y="52" width="18" height="18" fill="#00A4EF"/>
  <rect x="47" y="52" width="18" height="18" fill="#00A4EF"/>
  
  <!-- Scan Lines -->
  <line x1="90" y1="30" x2="340" y2="30" stroke="#0078D4" stroke-width="2" stroke-dasharray="5,5">
    <animate attributeName="x2" values="90;300;90" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="90" y1="50" x2="340" y2="50" stroke="#00A4EF" stroke-width="2" stroke-dasharray="5,5">
    <animate attributeName="x2" values="340;90;340" dur="3s" repeatCount="indefinite"/>
  </line>
  <line x1="90" y1="70" x2="340" y2="70" stroke="#0078D4" stroke-width="2" stroke-dasharray="5,5">
    <animate attributeName="x2" values="90;300;90" dur="3s" repeatCount="indefinite"/>
  </line>
  
  <!-- Text -->
  <text x="90" y="22" font-family="Courier New, monospace" font-size="24" font-weight="bold" fill="#00A4EF" filter="url(#glow)">
    WINPE-SCAN
  </text>
  
  <!-- Magnifying Glass Icon -->
  <circle cx="350" cy="55" r="20" stroke="#00A4EF" stroke-width="3" fill="none" filter="url(#glow)"/>
  <line x1="365" y1="70" x2="380" y2="85" stroke="#00A4EF" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Subtitle -->
  <text x="92" y="95" font-family="Courier New, monospace" font-size="10" fill="#666">
    Windows PE Analyzer v1.0
  </text>
</svg>
